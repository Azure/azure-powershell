parameters:
- name: win_ps
  displayName: Windows PowerShell Version
  type: string
  default: 5.1.14
- name: ps7_4
  displayName: PowerShell 7.4.x Version
  type: string
  default: 7.4.*
- name: ps7_5
  displayName: PowerShell 7.5.x Version
  type: string
  default: 7.5.*
- name: ps7_6
  displayName: PowerShell 7.6.x Version
  type: string
  default: 7.6.*
- name: preview_ps
  displayName: PowerShell Preview Version
  type: string
  default: preview
- name: dotnet_sdk_8
  displayName: .NET SDK 8
  type: string
  default: 8.x
- name: dotnet_sdk_9
  displayName: .NET SDK 9
  type: string
  default: 9.x
- name: dotnet_sdk_10
  displayName: .NET SDK 10
  type: string
  default: 10.x

variables:
  winAgentPoolName: pool-windows-2022
  linuxAgentPoolName: pool-ubuntu-2404
  macOsAgentPoolName: Azure Pipelines
  macOsAgentPoolVMImage: macOS-latest

pr: none
trigger: none

jobs:
- job: CheckLatestPowerShellVersion
  displayName: Check for latest PowerShell version
  pool:
    name: ${{ variables.linuxAgentPoolName }}
  steps:
  - task: PowerShell@2
    displayName: Check for latest PowerShell version
    inputs:
      pwsh: true
      targetType: filePath
      filePath: ./tools/TestFx/Live/CheckLatestPowerShellVersion.ps1
